<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35" />
      <stop offset="100%" stop-color="#E91E63" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#brand-grad)" stroke-width="4" />
  <g transform="translate(10, 10)">
    <!-- Frying Pan -->
    <path d="M 30,55 A 20,20 0 1,0 60,35 L 75,20 C 77,18 80,21 78,23 L 63,38 A 20,20 0 0,0 30,55 Z" fill="url(#brand-grad)" filter="url(#glow)" />
    <!-- Steam Lines -->
    <path d="M 40,20 Q 42,12 40,5" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8" />
    <path d="M 50,22 Q 52,15 50,8" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8" />
  </g>
</svg>
